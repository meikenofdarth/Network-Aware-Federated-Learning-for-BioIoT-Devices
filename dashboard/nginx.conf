server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api/* to the FastAPI bridge running in the same namespace.
    # The service name resolves via Kubernetes internal DNS.
    location /api/ {
        proxy_pass http://dashboard-api-service.aggregator.svc.cluster.local:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Short timeout — dashboard degrades gracefully if API is slow
        proxy_read_timeout 3s;
        proxy_connect_timeout 2s;
    }

    # SPA routing — all unknown paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static asset caching
    location ~* \.(js|css|png|ico|svg)$ {
        expires 1d;
        add_header Cache-Control "public";
    }
}