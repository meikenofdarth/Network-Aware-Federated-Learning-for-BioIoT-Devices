syntax = "proto3";

package biosignal;

message SignalRequest {
    string hospital_id = 1;
    double value = 2;
    bool is_burst = 3;
    double timestamp = 4;
}

message SignalResponse {
    string status = 1;
    bool trigger_training = 2;
}

service BioNetService {
    // UPGRADE: Unary → Bidirectional Streaming
    // One persistent HTTP/2 stream replaces thousands of TCP handshakes
    // during a seizure burst. The server can now push back control signals
    // (e.g. trigger_training=True) without the client polling.
    rpc StreamSignal (stream SignalRequest) returns (stream SignalResponse);
}
