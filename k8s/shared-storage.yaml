# THIS FILE IS INTENTIONALLY DISABLED FOR AKS DEPLOYMENTS.
#
# hostPath PersistentVolumes are node-local. On a multi-node AKS cluster,
# pods scheduled on different nodes would each see a different /data/model-buffer
# directory, silently breaking the shared weight buffer between hpc-aggregator
# and global-aggregator.
#
# The production storage configuration is in k8s/infra.yaml, which uses
# the Azure File CSI driver (file.csi.azure.com) with ReadWriteMany access
# across all nodes in the cluster.
#
# DO NOT apply this file to AKS. It is kept only as a reference for
# local single-node Minikube development.
#
# To apply storage on AKS, use:
#   kubectl apply -f k8s/infra.yaml

# apiVersion: v1
# kind: PersistentVolume
# metadata:
#   name: model-buffer-pv
# spec:
#   capacity:
#     storage: 1Gi
#   accessModes:
#     - ReadWriteMany
#   hostPath:
#     path: "/data/model-buffer"
# ---
# apiVersion: v1
# kind: PersistentVolumeClaim
# metadata:
#   name: model-buffer-pvc
#   namespace: aggregator
# spec:
#   accessModes:
#     - ReadWriteMany
#   resources:
#     requests:
#       storage: 1Gi